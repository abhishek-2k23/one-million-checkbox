<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1M Checkboxes | Real-time Grid</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1e1e1e;
            --border-color: #333;
            --checkbox-bg: #2a2a2a;
            --checkbox-border: #444;
            --checkbox-hover: #3a3a3a;
            --checkbox-checked: #bb86fc;
            --checkbox-checked-hover: #9965db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--header-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        button {
            background-color: var(--checkbox-checked);
            color: #000;
            border: none;
            padding: 0.5rem 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--checkbox-checked-hover);
        }

        button.secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        button.secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        #status-bar {
            display: flex;
            gap: 2rem;
            padding: 1rem 2rem;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        #scroll-container {
            flex-grow: 1;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        #grid-container {
            position: relative;
            width: 100%;
        }

        .cell {
            position: absolute;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox {
            width: 100%;
            height: 100%;
            background-color: var(--checkbox-bg);
            border: 2px solid var(--checkbox-border);
            border-radius: 0;
            cursor: pointer;
            margin: 0;
            box-sizing: border-box;
            position: relative;
            transition: all 0.2s ease-in-out;
        }

        .checkbox:hover {
            background-color: var(--checkbox-hover);
            border-color: var(--checkbox-checked);
            transform: scale(1.1);
        }

        .checkbox.checked {
            background-color: var(--checkbox-checked);
            border-color: var(--checkbox-checked);
        }

        .checkbox.checked::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: #000;
        }

        .checkbox.checked:hover {
            background-color: var(--checkbox-checked-hover);
            border-color: var(--checkbox-checked-hover);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(187, 134, 252, 0.7); }
            50% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(187, 134, 252, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(187, 134, 252, 0); }
        }
        .cell.updated-remote .checkbox {
            animation: pulse 0.5s ease-out;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--header-bg);
            border: 1px solid var(--border-color);
            padding: 1rem;
            color: var(--text-color);
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .toast.visible {
            display: block;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            #status-bar {
                justify-content: center;
            }
            #scroll-container {
                padding: 1rem;
            }
            /* Could adjust checkbox size if needed but it's absolute positioned via JS */
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Check_Boxes</h1>
        <div class="auth-panel">
            <div id="user-info" style="display: none;">
                <span id="display-name"></span>
                <button id="logout-btn" class="secondary">Logout</button>
            </div>
            <div id="login-form">
                <button id="login-btn">Login via OIDC</button>
            </div>
        </div>
    </header>

    <div id="status-bar">
        <div class="stat-item">Connection: <span id="conn-status">Disconnected</span></div>
        <div class="stat-item">Total Checkboxes: <span id="total-count">1,000,000</span></div>
        <div class="stat-item">Viewing: <span id="viewport-range">0 - 0</span></div>
    </div>

    <main id="scroll-container">
        <div id="grid-container">
            <!-- Checkboxes will be rendered here dynamically -->
        </div>
    </main>

    <div id="toast" class="toast">
        <div id="toast-message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
